global:
  scrape_interval: 1s
  evaluation_interval: 5s
  external_labels:
    monitor: benchmark-platform

scrape_configs:
  # The benchmark-runner is the single, fair measurement engine for all 11
  # transports. It runs on the host and exposes /metrics (--metrics flag).
  # From inside the Prometheus container, the host is reached via
  # host.docker.internal (Docker Desktop on Windows/macOS).
  - job_name: benchmark-runner
    static_configs:
      - targets: ["host.docker.internal:9190"]

  # k6 pushes its own metrics here via the experimental Prometheus
  # remote-write output (K6_PROMETHEUS_RW_SERVER_URL). These act as the
  # independent cross-check on HTTP/WebSocket/SSE.
  # Enable remote-write receiver: prometheus --web.enable-remote-write-receiver
